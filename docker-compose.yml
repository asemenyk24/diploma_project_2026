version: '3.8'

services:
  jupyter-blackwell-notebook:
    build:
      context: .
      args:
        - BUILDKIT_PROGRESS=plain
    container_name: jupyter_notebook_blackwell
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    ports:
      - "8888:8888"
    volumes:
      - .:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      sh -c "python -c \"import torch; print(f'GPU: {torch.cuda.get_device_name(0)}')\" &&
             jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password='' --NotebookApp.open_browser=False"